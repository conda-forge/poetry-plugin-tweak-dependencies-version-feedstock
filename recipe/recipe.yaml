# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.5.6"
  name: poetry-plugin-tweak-dependencies-version
  mod: ${{ name | replace("-", "_") }}
  # dulwich not yet available for 3.14
  python_check_max: "3.13"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/py3/p/${{ name }}/${{ mod }}-${{ version }}-py3-none-any.whl
  sha256: b0bb812b6d47e6ddf0673e9d0cdd24f4fdf5bd75ca7b00dd21e73164e45706c1

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install -vv --no-deps --no-build-isolation ${{ mod }}-${{ version }}-py3-none-any.whl
    - ${{ PYTHON }} -c "__import__('zipfile').ZipFile('${{ mod }}-${{ version }}-py3-none-any.whl').extractall()"

requirements:
  host:
    - pip
    - poetry-core
    - python ${{ python_min }}.*
  run:
    - python >=${{ python_min }}
    - poetry >=1.6,<2.1

tests:
  - python:
      imports: ${{ mod }}
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*

about:
  summary: Poetry plugin used to tweak dependency versions
  license: BSD-2-Clause
  license_file: ${{ mod }}-${{ version }}.dist-info/LICENSE
  homepage: https://pypi.org/project/poetry-plugin-tweak-dependencies-version
  repository: https://github.com/sbrunner/${{ name }}

extra:
  recipe-maintainers:
    - bollwyvl
